<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='6' fill='%234f46e5'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-size='18' font-weight='bold' fill='white' font-family='sans-serif'%3EA%3C/text%3E%3C/svg%3E" type="image/svg+xml">
<title>Auto i18n</title>
<style>
  :root {
    --bg: #f5f6fa;
    --surface: #fff;
    --surface2: #f8f9fc;
    --border: #e2e5ed;
    --text: #1e2235;
    --text2: #6b7280;
    --text3: #9ca3af;
    --primary: #4f46e5;
    --primary-hover: #4338ca;
    --primary-bg: #eef2ff;
    --success: #059669;
    --success-bg: #ecfdf5;
    --danger: #dc2626;
    --danger-bg: #fef2f2;
    --shadow: 0 1px 2px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.1);
    --radius: 10px;
    --radius-sm: 6px;
    --transition: .2s ease;
  }

  .dark {
    --bg: #0f111a;
    --surface: #1a1d2e;
    --surface2: #1e2235;
    --border: #2a2e42;
    --text: #e4e6f0;
    --text2: #9ca3af;
    --text3: #6b7280;
    --primary: #6366f1;
    --primary-hover: #818cf8;
    --primary-bg: #1e1b4b;
    --success: #10b981;
    --success-bg: #064e3b;
    --danger: #ef4444;
    --danger-bg: #450a0a;
    --shadow: 0 1px 2px rgba(0,0,0,.3), 0 1px 3px rgba(0,0,0,.4);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans SC", sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    transition: background var(--transition), color var(--transition);
  }

  svg { fill: currentColor; flex-shrink: 0; }

  .top {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: center;
    flex-shrink: 0;
    transition: background var(--transition), border var(--transition);
  }

  .top-inner {
    width: 100%;
    max-width: 900px;
    padding: 0 24px;
    height: 60px;
    display: flex;
    align-items: center;
    gap: 28px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    font-size: 18px;
    font-weight: 700;
    color: var(--primary);
  }

  .logo svg { width: 28px; height: 28px; }

  .tabs { display: flex; gap: 2px; }

  .tab {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--text2);
    font-family: inherit;
    transition: all .15s;
  }

  .tab:hover { color: var(--text); background: var(--surface2); }
  .tab.active { color: var(--primary); background: var(--primary-bg); font-weight: 600; }
  .tab svg { width: 18px; height: 18px; }

  .spacer { flex: 1; }

  .theme-btn {
    width: 36px; height: 36px;
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text2);
    transition: all .15s;
  }

  .theme-btn:hover { color: var(--text); border-color: var(--text3); }
  .theme-btn svg { width: 18px; height: 18px; }

  .main {
    flex: 1;
    padding: 32px 24px 56px;
    max-width: 900px;
    width: 100%;
    margin: 0 auto;
  }

  .panel { display: none; }
  .panel.active { display: block; }

  .panel-h { margin-bottom: 24px; }
  .panel-h h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
  .panel-h p { font-size: 14px; color: var(--text2); }

  .steps {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
  }

  .step {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-size: 13px;
    color: var(--text3);
    transition: all .2s;
  }

  .step .num {
    width: 24px; height: 24px;
    border-radius: 50%;
    background: var(--border);
    color: var(--text3);
    font-size: 12px;
    font-weight: 700;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }

  .step.active { color: var(--text); border-color: var(--primary); }
  .step.active .num { background: var(--primary); color: #fff; }
  .step.done { color: var(--success); border-color: var(--success); }
  .step.done .num { background: var(--success); color: #fff; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
    transition: background var(--transition), border var(--transition);
  }

  .drop {
    border: 2px dashed var(--border);
    border-radius: var(--radius);
    padding: 28px 20px;
    text-align: center;
    cursor: pointer;
    transition: all .15s;
    background: var(--surface2);
  }

  .drop:hover { border-color: var(--primary); background: var(--primary-bg); }
  .drop.dragover { border-color: var(--primary); background: var(--primary-bg); }
  .drop svg { width: 36px; height: 36px; color: var(--text3); margin-bottom: 8px; }
  .drop .dt { font-size: 14px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
  .drop .ds { font-size: 13px; color: var(--text3); }
  .drop .df { display: none; align-items: center; gap: 8px; }
  .drop.has-file { border-color: var(--success); background: var(--success-bg); }
  .drop.has-file .df { display: inline-flex; }
  .drop.has-file .dp { display: none; }
  .drop .df .di {
    padding: 8px 14px;
    background: var(--primary-bg);
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 500;
    color: var(--primary);
    text-align: left;
    max-width: 100%;
  }
  .drop .df .di .nm { font-weight: 600; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 260px; }
  .drop .df .di .sz { font-weight: 400; font-size: 12px; color: var(--text2); }

  .fld { margin-bottom: 16px; }
  .fld:last-child { margin-bottom: 0; }
  .fld label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: var(--text); }
  .fld label .ht { font-weight: 400; color: var(--text3); font-size: 12px; }

  .fld input[type="text"] {
    width: 100%;
    padding: 9px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    font-size: 14px;
    outline: none;
    background: var(--surface);
    color: var(--text);
    transition: border .15s;
  }

  .fld input[type="text"]:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(79,70,229,.12); }

  .lg {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 8px;
  }

  .lg button {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 13px;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all .12s;
    font-family: inherit;
  }

  .lg button:hover { border-color: var(--primary); color: var(--primary); }
  .lg button.sel { background: var(--primary); color: #fff; border-color: var(--primary); }

  .acts {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    margin-top: 8px;
  }

  .btn {
    padding: 9px 22px;
    border: none;
    border-radius: var(--radius-sm);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .12s;
    font-family: inherit;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    text-decoration: none;
    white-space: nowrap;
  }

  .btn:active { transform: scale(.97); }
  .btn-p { background: var(--primary); color: #fff; }
  .btn-p:hover { background: var(--primary-hover); }
  .btn-p:disabled { opacity: .4; cursor: not-allowed; }
  .btn-p:disabled:active { transform: none; }
  .btn-s { background: var(--success); color: #fff; }
  .btn-s:hover { background: #047857; }
  .btn-s:disabled { opacity: .4; cursor: not-allowed; }
  .btn-s:disabled:active { transform: none; }
  .btn-g { background: transparent; color: var(--text2); border: 1px solid var(--border); }
  .btn-g:hover { background: var(--surface2); }
  .btn-d { background: var(--danger); color: #fff; }
  .btn-d:hover { background: #b91c1c; }
  .btn-d:disabled { opacity: .4; cursor: not-allowed; }
  .btn-d:disabled:active { transform: none; }
  .btn-sm { padding: 5px 12px; font-size: 12px; }

  .st {
    display: none;
    margin-top: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-sm);
    font-size: 14px;
    line-height: 1.6;
  }

  .st.sh { display: block; }
  .st.lo { background: var(--primary-bg); color: var(--primary); border: 1px solid #c7d2fe; }
  .st.ok { background: var(--success-bg); color: #065f46; border: 1px solid #a7f3d0; }
  .st.er { background: var(--danger-bg); color: var(--danger); border: 1px solid #fecaca; }

  .st .sp {
    display: inline-block;
    width: 16px; height: 16px;
    border: 2px solid #c7d2fe;
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin .6s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }

  .st .pb {
    display: block;
    width: 100%;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin-top: 10px;
    overflow: hidden;
  }

  .st .pb .bar {
    height: 100%;
    width: 30%;
    background: linear-gradient(90deg, var(--primary), var(--primary-hover));
    border-radius: 2px;
    animation: pb-indeterminate 1.4s ease-in-out infinite;
  }

  @keyframes pb-indeterminate {
    0% { transform: translateX(-100%); }
    100% { transform: translateX(400%); }
  }

  @keyframes spin { to { transform: rotate(360deg); } }
  .st .btn { margin-top: 8px; }

  .gc { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* History */
  .he {
    text-align: center;
    padding: 48px 20px;
    color: var(--text3);
  }

  .he svg { width: 48px; height: 48px; margin-bottom: 12px; opacity: .5; }
  .he p { font-size: 14px; }

  .hl { display: flex; flex-direction: column; gap: 8px; }

  .hi {
    display: flex;
    align-items: flex-start;
    gap: 14px;
    padding: 14px 16px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    background: var(--surface);
    transition: all .15s;
  }

  .hi:hover { border-color: var(--primary); cursor: pointer; }

  .hi .hi-icon {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .hi .hi-icon svg { width: 18px; height: 18px; }
  .hi .hi-icon.hix { background: var(--primary-bg); color: var(--primary); }
  .hi .hi-icon.hig { background: var(--success-bg); color: var(--success); }
  .hi .hi-icon.hie { background: var(--danger-bg); color: var(--danger); }

  .hi .hb { flex: 1; min-width: 0; }
  .hi .hb .htl { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
  .hi .hb .hm { font-size: 12px; color: var(--text3); line-height: 1.5; }
  .hi .hb .hs { font-size: 12px; font-weight: 600; margin-top: 4px; }
  .hi .hb .hs.ok { color: var(--success); }
  .hi .hb .hs.er { color: var(--danger); }

  .hc {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }

  .hc .hc-l { display: flex; align-items: center; gap: 8px; }
  .hc .hc-l svg { width: 20px; height: 20px; color: var(--text2); }
  .hc .count { font-size: 13px; color: var(--text2); }

  .hd {
    display: none;
    margin-top: 8px;
    padding: 10px 14px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--text2);
    line-height: 1.6;
  }

  .hd.sh { display: block; }
  .hd .dr { display: flex; gap: 8px; margin-bottom: 4px; }
  .hd .dr:last-child { margin-bottom: 0; }
  .hd .dl { color: var(--text3); width: 70px; flex-shrink: 0; }

  @media (max-width: 640px) {
    .gc { grid-template-columns: 1fr; }
    .top { padding: 0; }
    .top-inner { padding: 0 12px; gap: 10px; }
    .logo { font-size: 16px; }
    .tab { padding: 6px 10px; font-size: 13px; }
    .main { padding: 20px 12px 40px; }
    .steps { flex-direction: column; }
    .hi { flex-wrap: wrap; }
  }

  /* History item delete button */
  .hi .hdel {
    width: 30px; height: 30px;
    border: none;
    background: transparent;
    border-radius: var(--radius-sm);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    flex-shrink: 0;
    margin-top: -2px;
    transition: all .15s;
  }

  .hi .hdel:hover { background: var(--danger-bg); color: var(--danger); }
  .hi .hdel svg { width: 16px; height: 16px; }

  .hi .hb .htime2 {
    font-size: 12px;
    color: var(--text3);
    margin-top: 6px;
  }

  /* Dialog / Modal */
  .dialog-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,.4);
    z-index: 1000;
    align-items: center;
    justify-content: center;
  }

  .dialog-overlay.sh { display: flex; }

  .dialog-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 28px 24px 20px;
    width: 380px;
    max-width: 90vw;
    box-shadow: 0 20px 60px rgba(0,0,0,.15);
    text-align: center;
  }

  .dialog-box .dialog-icon {
    width: 48px; height: 48px;
    border-radius: 50%;
    background: var(--danger-bg);
    color: var(--danger);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 16px;
  }

  .dialog-box .dialog-icon svg { width: 24px; height: 24px; }

  .dialog-box h3 { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
  .dialog-box p { font-size: 14px; color: var(--text2); margin-bottom: 20px; line-height: 1.5; }

  .dialog-box .dialog-acts {
    display: flex;
    gap: 10px;
    justify-content: center;
  }

  .dialog-box .dialog-acts button {
    min-width: 80px;
  }
</style>
</head>
<body>

<div class="top">
  <div class="top-inner">
  <a class="logo" href="/">
    <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03A17.52 17.52 0 0014.07 6H17V4h-7V2H8v2H1v1.99h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04zM18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12zm-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
    Auto i18n
  </a>
  <div class="tabs">
    <button class="tab" data-tab="extract">
      <svg viewBox="0 0 20 20"><path d="M10 1a1 1 0 011 1v7h7a1 1 0 110 2h-7v7a1 1 0 11-2 0v-7H2a1 1 0 110-2h7V2a1 1 0 011-1z"/></svg>
      提取
    </button>
    <button class="tab" data-tab="generate">
      <svg viewBox="0 0 20 20"><path d="M7 16a1 1 0 01-.707-1.707l5-5a1 1 0 011.414 1.414l-5 5A1 1 0 017 16z"/><path d="M13 16a1 1 0 01-.707-1.707l2-2a1 1 0 011.414 1.414l-2 2A1 1 0 0113 16z"/><path fill-rule="evenodd" d="M4 2a2 2 0 00-2 2v12a2 2 0 002 2h12a2 2 0 002-2V4a2 2 0 00-2-2H4zm0 2h12v12H4V4z"/></svg>
      生成
    </button>
    <button class="tab" data-tab="history">
      <svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"/></svg>
      历史
      <span class="badge" id="hbadge" style="display:none">0</span>
    </button>
  </div>
  <div class="spacer"></div>
  <button class="theme-btn" id="theme-btn" title="切换主题">
    <svg viewBox="0 0 20 20" id="sun-icon"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z"/></svg>
    <svg viewBox="0 0 20 20" id="moon-icon" style="display:none"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
  </button>
  </div>
</div>

<div class="main">

<!-- Extract -->
<div class="panel" id="panel-extract">
  <div class="panel-h">
    <h2>提取可翻译文案</h2>
    <p>从源语言 JSON 中自动提取所有可翻译文案，生成 xlsx 翻译模板</p>
  </div>

  <div class="steps" id="wf-extract">
    <div class="step active"><span class="num">1</span>上传 JSON 文件</div>
    <div class="step"><span class="num">2</span>指定目标语言</div>
    <div class="step"><span class="num">3</span>下载模板</div>
  </div>

  <div class="card">
    <div class="fld">
      <label>源语言 JSON</label>
      <div class="drop" id="drop-extract">
        <div class="dp">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zM6 20V4h7v5h5v11H6z"/><path d="M12 11v4h-2l3 3 3-3h-2v-4h-2z"/></svg>
          <div class="dt">点击或拖拽上传</div>
          <div class="ds">支持 .json 格式</div>
        </div>
        <div class="df">
          <div class="di">
            <div class="nm"><svg viewBox="0 0 20 20" style="width:16px;height:16px;vertical-align:middle;margin-right:4px"><path d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg><span id="extract-filename"></span></div>
            <div class="sz" id="extract-filesize"></div>
          </div>
        </div>
      </div>
      <input type="file" id="extract-input" accept=".json" style="display:none">
    </div>

    <div class="fld">
      <label>目标语言 <span class="ht">（翻译人员需要翻译的语言）</span>
        <button class="btn-g btn-sm" id="edit-langs-btn" style="font-size:11px;margin-left:6px;vertical-align:middle">编辑列表</button>
      </label>
      <input type="text" id="extract-langs" placeholder="例如: zh-CN, ja, ko">
      <div style="display:flex;gap:4px;margin-top:6px;flex-wrap:wrap" id="lang-groups"></div>
      <div class="lg" id="lang-tags"></div>
      <div style="margin-top:8px;display:flex;align-items:center;gap:8px">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none">
          <input type="checkbox" checked id="split-tags-check" style="width:16px;height:16px;cursor:pointer;accent-color:var(--primary);flex-shrink:0;">
          拆分 HTML 标签文案
          <span style="font-size:11px;color:var(--text3)">（将含标签的文案拆分为多段分别翻译，生成其他语言的 JSON 文件时，再组装回原始格式）</span>
        </label>
      </div>
      <div style="margin-top:4px;display:flex;align-items:center;gap:8px" id="strip-tags-row">
        <label style="display:flex;align-items:center;gap:6px;cursor:pointer;font-size:13px;color:var(--text2);user-select:none">

<script>
// Global settings memory
const SETTINGS_KEY = 'auto-i18n-settings';

function loadSettings() {
  try { return JSON.parse(localStorage.getItem(SETTINGS_KEY)) || {}; } catch { return {}; }
}

function saveSettingsPatch(patch) {
  const s = loadSettings();
  Object.assign(s, patch);
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

// Theme
const themeBtn = document.getElementById('theme-btn');
const sunIcon = document.getElementById('sun-icon');
const moonIcon = document.getElementById('moon-icon');

function setTheme(dark) {
  document.documentElement.classList.toggle('dark', dark);
  sunIcon.style.display = dark ? 'none' : '';
  moonIcon.style.display = dark ? '' : 'none';
  localStorage.setItem('theme', dark ? 'dark' : 'light');
}

themeBtn.addEventListener('click', () => {
  setTheme(!document.documentElement.classList.contains('dark'));
});

const saved = localStorage.getItem('theme');
if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
  setTheme(true);
}

// Storage
const SK = 'auto-i18n-history';
function loadH() { try { return JSON.parse(localStorage.getItem(SK)) || []; } catch { return []; } }
function saveH(h) { localStorage.setItem(SK, JSON.stringify(h)); updateBadge(); renderH(); }
function addH(e) { const h = loadH(); h.unshift({ id: Date.now(), time: new Date().toLocaleString(), ...e }); saveH(h); }

function updateBadge() {
  const h = loadH();
  const b = document.getElementById('hbadge');
  if (h.length) { b.style.display = 'inline'; b.textContent = h.length; } else { b.style.display = 'none'; }
}

function fmtSize(b) {
  if (!b) return '';
  if (b < 1024) return b + ' B';
  if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1048576).toFixed(1) + ' MB';
}

function renderH() {
  const h = loadH();
  const c = document.getElementById('hcontainer');
  document.getElementById('hcount').textContent = '共 ' + h.length + ' 条记录';
  document.getElementById('clear-btn').style.display = h.length ? '' : 'none';

  if (!h.length) {
    c.innerHTML = '<div class="he"><svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"/></svg><p>还没有操作记录</p></div>';
    return;
  }

  c.innerHTML = '<div class="hl">' + h.map(item => {
    const ix = item.type === 'extract';
    const ic = item.status === 'error' ? 'hie' : (ix ? 'hix' : 'hig');
    const st = item.status === 'error' ? '失败' : '已完成';
    const sc = item.status === 'error' ? 'er' : 'ok';

    let meta = '';
    if (item.langs) meta += (ix ? '目标语言: ' : '生成语言: ') + item.langs + ' &middot; ';
    if (item.count !== undefined) meta += (ix ? '提取 ' : '') + item.count + (ix ? ' 条' : ' 个语言') + ' &middot; ';
    if (item.filesize) meta += fmtSize(item.filesize) + ' &middot; ';

    let dd = '';
    if (item.status !== 'error') {
      dd += '<div class="dr"><span class="dl">操作类型</span>' + (ix ? '提取文案' : '生成 JSON') + '</div>';
      dd += '<div class="dr"><span class="dl">源文件</span>' + (item.filename || '-') + '</div>';
      if (item.langs) dd += '<div class="dr"><span class="dl">' + (ix ? '目标语言' : '生成语言') + '</span>' + item.langs + '</div>';
      if (item.count !== undefined) dd += '<div class="dr"><span class="dl">' + (ix ? '文案数' : '语言数') + '</span>' + item.count + '</div>';
    } else {
      dd += '<div class="dr"><span class="dl">错误信息</span>' + (item.error || '未知错误') + '</div>';
    }

    return '<div class="hi" onclick="toggleHD(' + item.id + ')">' +
      '<div class="hi-icon ' + ic + '">' +
        (item.status === 'error'
          ? '<svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7 4a1 1 0 11-2 0 1 1 0 012 0zm-1-9a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1z"/></svg>'
          : (ix
            ? '<svg viewBox="0 0 20 20"><path d="M10 1a1 1 0 011 1v7h7a1 1 0 110 2h-7v7a1 1 0 11-2 0v-7H2a1 1 0 110-2h7V2a1 1 0 011-1z"/></svg>'
            : '<svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"/></svg>')) +
      '</div>' +
      '<div class="hb">' +
        '<div class="htl">' + (ix ? '提取文案' : '生成 JSON') + ' — ' + (item.filename || '未知文件') + '</div>' +
        '<div class="hm">' + meta + '</div>' +
        '<div class="hs ' + sc + '">' + st + '</div>' +
        '<div class="hd" id="hd-' + item.id + '">' + dd + '</div>' +
        '<div class="htime2">' + item.time + '</div>' +
      '</div>' +
      '<button class="hdel" onclick="event.stopPropagation();showDelDialog(' + item.id + ')" title="删除">' +
        '<svg viewBox="0 0 20 20"><path fill-rule="evenodd" d="M9 2a1 1 0 00-.894.553L7.382 4H4a1 1 0 000 2v10a2 2 0 002 2h8a2 2 0 002-2V6a1 1 0 100-2h-3.382l-.724-1.447A1 1 0 0011 2H9zM7 8a1 1 0 012 0v6a1 1 0 11-2 0V8zm5-1a1 1 0 00-1 1v6a1 1 0 102 0V8a1 1 0 00-1-1z"/></svg>' +
      '</button>' +
    '</div>';
  }).join('') + '</div>';
}

// Tab switching with URL routing
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelector('.tab[data-tab="' + tab + '"]').classList.add('active');
  document.getElementById('panel-' + tab).classList.add('active');
  if (tab === 'history') renderH();
}

function navigateTo(path) {
  const raw = path.replace(/^\//, '') || 'extract';
  const valid = ['extract', 'generate', 'history'];
  const target = valid.includes(raw) ? raw : 'extract';
  history.pushState({ tab: target }, '', '/' + target);
  switchTab(target);
}

document.querySelectorAll('.tab').forEach(btn => {
  btn.addEventListener('click', () => {
    navigateTo('/' + btn.dataset.tab);
  });
});

window.addEventListener('popstate', e => {
  const tab = (e.state && e.state.tab) || 'extract';
  switchTab(tab);
});

(function initRoute() {
  const raw = window.location.pathname.replace(/^\//, '') || 'extract';
  const valid = ['extract', 'generate', 'history'];
  switchTab(valid.includes(raw) ? raw : 'extract');
})();

// Lang tags
const LANG_STORAGE_KEY = 'auto-i18n-langs';
let allLangs = [];
let editMode = false;

async function loadLangs() {
  const saved = localStorage.getItem(LANG_STORAGE_KEY);
  if (saved) {
    try { allLangs = JSON.parse(saved); } catch { allLangs = []; }
  }
  if (!allLangs || !allLangs.length) {
    try {
      const r = await fetch('/api/langs');
      const data = await r.json();
      allLangs = data.map(l => ({ code: l.code, name: l.name || '' }));
    } catch {}
  }
  renderLangs();
}

function saveLangsToStorage() {
  localStorage.setItem(LANG_STORAGE_KEY, JSON.stringify(allLangs));
}

function renderLangs() {
  const tagsEl = document.getElementById('lang-tags');
  const groupsEl = document.getElementById('lang-groups');
  const editList = document.getElementById('lang-editor-list');
  const savedSel = loadSettings().selectedLangs || [];

  tagsEl.innerHTML = allLangs.map(l =>
    '<button data-lang="' + l.code + '" title="' + (l.name || '') + '">' + l.code + '</button>'
  ).join('');

  groupsEl.innerHTML =
    '<button class="btn-g btn-sm" id="select-all-btn" style="font-size:11px">全选</button>' +
    '<button class="btn-g btn-sm" id="clear-all-btn" style="font-size:11px;color:var(--danger)">清除</button>';

  if (editList) {
    editList.innerHTML = allLangs.map((l, i) =>
      '<span style="display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:var(--surface);border:1px solid var(--border);border-radius:4px;font-size:13px">' +
        '<span title="' + (l.name || '') + '">' + l.code + '</span>' +
        '<button class="del-lang-btn" data-idx="' + i + '" style="border:none;background:none;cursor:pointer;color:var(--danger);font-size:14px;line-height:1;padding:0 2px">&times;</button>' +
      '</span>'
    ).join('');

    document.querySelectorAll('.del-lang-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = parseInt(btn.dataset.idx);
        allLangs.splice(idx, 1);
        saveLangsToStorage();
        renderLangs();
      });
    });
  }

  document.querySelectorAll('#lang-tags button').forEach(btn => {
    if (savedSel.includes(btn.dataset.lang)) {
      btn.classList.add('sel');
    }
    btn.addEventListener('click', () => {
      btn.classList.toggle('sel');
      updateLangs();
    });
  });
  updateLangs();

  document.getElementById('select-all-btn').addEventListener('click', () => {
    const allSel = document.querySelectorAll('#lang-tags button').length === document.querySelectorAll('#lang-tags button.sel').length;
    document.querySelectorAll('#lang-tags button').forEach(b => b.classList.toggle('sel', !allSel));
    document.getElementById('select-all-btn').textContent = allSel ? '全选' : '取消全选';
    updateLangs();
  });

  document.getElementById('clear-all-btn').addEventListener('click', () => {
    document.querySelectorAll('#lang-tags button.sel').forEach(b => b.classList.remove('sel'));
    document.getElementById('select-all-btn').textContent = '全选';
    updateLangs();
  });
}

function updateLangs() {
  const selected = document.querySelectorAll('#lang-tags button.sel');
  const sel = Array.from(selected).map(b => b.dataset.lang);
  if (selected.length) {
    document.getElementById('extract-langs').value = sel.join(',');
  }
  saveSettingsPatch({ selectedLangs: sel });
}

// Editor toggle
document.getElementById('edit-langs-btn').addEventListener('click', () => {
  editMode = !editMode;
  document.getElementById('lang-editor').style.display = editMode ? 'block' : 'none';
  document.getElementById('edit-langs-btn').textContent = editMode ? '关闭编辑' : '编辑列表';
  if (editMode) renderLangs();
});

document.getElementById('close-editor-btn').addEventListener('click', () => {
  editMode = false;
  document.getElementById('lang-editor').style.display = 'none';
  document.getElementById('edit-langs-btn').textContent = '编辑列表';
});

document.getElementById('add-lang-btn').addEventListener('click', () => {
  const inp = document.getElementById('new-lang-input');
  const code = inp.value.trim();
  if (!code) return;
  if (allLangs.some(l => l.code === code)) {
    inp.value = '';
    return;
  }
  allLangs.push({ code: code, name: '' });
  saveLangsToStorage();
  inp.value = '';
  renderLangs();
});

document.getElementById('new-lang-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('add-lang-btn').click();
});

document.getElementById('reset-langs-btn').addEventListener('click', async () => {
  localStorage.removeItem(LANG_STORAGE_KEY);
  try {
    const r = await fetch('/api/langs');
    const data = await r.json();
    allLangs = data.map(l => ({ code: l.code, name: l.name || '' }));
  } catch {}
  saveLangsToStorage();
  renderLangs();
});

// Drop zone
function setupDZ(dzId, inpId, nmId, szId, cb) {
  const dz = document.getElementById(dzId);
  const inp = document.getElementById(inpId);
  dz.addEventListener('click', () => inp.click());
  inp.addEventListener('change', onF);
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('dragover'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('dragover'));
  dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('dragover'); if (e.dataTransfer.files.length) { inp.files = e.dataTransfer.files; onF(); } });
  dz.addEventListener('touchmove', e => { e.preventDefault(); dz.classList.add('dragover'); }, { passive: false });
  dz.addEventListener('touchend', e => {
    dz.classList.remove('dragover');
    if (e.changedTouches.length) {
      const touch = e.changedTouches[0];
      const el = document.elementFromPoint(touch.clientX, touch.clientY);
      if (el && (el === dz || dz.contains(el))) {
        inp.click();
      }
    }
  });
  function onF() {
    if (inp.files.length) {
      dz.classList.add('has-file');
      document.getElementById(nmId).textContent = inp.files[0].name;
      document.getElementById(szId).textContent = fmtSize(inp.files[0].size);
      cb();
    }
  }
}

function showSt(id, type, html) {
  const el = document.getElementById(id);
  el.className = 'st sh ' + type;
  el.innerHTML = html;
}

function setWF(barId, step) {
  document.querySelectorAll('#' + barId + ' .step').forEach((s, i) => {
    s.classList.remove('active', 'done');
    if (i + 1 === step) s.classList.add('active');
    else if (i + 1 < step) s.classList.add('done');
  });
}

// Extract
setupDZ('drop-extract', 'extract-input', 'extract-filename', 'extract-filesize', updE);

// Extract langs input memory
const langsInput = document.getElementById('extract-langs');
langsInput.addEventListener('input', () => {
  saveSettingsPatch({ extractLangs: langsInput.value });
  updE();
});

// Split tags checkbox
const splitTagsCheck = document.getElementById('split-tags-check');
splitTagsCheck.addEventListener('change', () => {
  if (splitTagsCheck.checked) {
    stripTagsCheck.checked = false;
    saveSettingsPatch({ stripTags: false });
  }
  saveSettingsPatch({ splitTags: splitTagsCheck.checked });
  toggleStripTagsVisibility();
});

// Strip tags checkbox
const stripTagsCheck = document.getElementById('strip-tags-check');
const stripTagsRow = document.getElementById('strip-tags-row');
stripTagsCheck.addEventListener('change', () => {
  saveSettingsPatch({ stripTags: stripTagsCheck.checked });
});
toggleStripTagsVisibility();

document.addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    const btn = document.getElementById('extract-btn');
    if (!btn.disabled && document.getElementById('panel-extract').classList.contains('active')) btn.click();
    const btn2 = document.getElementById('generate-btn');
    if (!btn2.disabled && document.getElementById('panel-generate').classList.contains('active')) btn2.click();
  }
});

function updE() {
  document.getElementById('extract-btn').disabled = !document.getElementById('extract-input').files.length;
  if (document.getElementById('extract-input').files.length) setWF('wf-extract', 2);
}

function toggleStripTagsVisibility() {
  if (splitTagsCheck.checked) {
    stripTagsRow.style.display = 'none';
  } else {
    stripTagsRow.style.display = 'flex';
  }
}

document.getElementById('extract-btn').addEventListener('click', async () => {
  const btn = document.getElementById('extract-btn');
  btn.disabled = true;
  showSt('extract-status', 'lo', '<span class="sp"></span>正在提取文案...<div class="pb"><div class="bar"></div></div>');
  const inp = document.getElementById('extract-input');
  const fn = inp.files[0].name;
  const fs = inp.files[0].size;
  const ls = document.getElementById('extract-langs').value.trim();
  const fd = new FormData();
  fd.append('file', inp.files[0]);
  fd.append('langs', ls);
  fd.append('splitTags', document.getElementById('split-tags-check').checked ? 'true' : '');
  fd.append('stripTags', document.getElementById('strip-tags-check').checked ? 'true' : '');
  try {
    const r = await fetch('/api/extract', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const ct = r.headers.get('X-I18n-Count') || '-';
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const nm = fn.replace(/\.json$/i, '.xlsx');
    addH({ type: 'extract', filename: fn, langs: ls || '(未指定)', count: ct, filesize: fs, status: 'done' });
    showSt('extract-status', 'ok', '&#10003; 提取成功<br><a href="' + url + '" download="' + nm + '" class="btn btn-p">&#8595; 下载 xlsx 模板</a>');
    document.querySelectorAll('#wf-extract .step').forEach(s => s.classList.add('done'));
  } catch (e) {
    addH({ type: 'extract', filename: fn, status: 'error', error: e.message });
    showSt('extract-status', 'er', '&#10007; ' + (e.message || '处理失败'));
  } finally { btn.disabled = false; }
});

// Generate
setupDZ('drop-xlsx', 'xlsx-input', 'xlsx-filename', 'xlsx-filesize', updG);
setupDZ('drop-json', 'json-input', 'json-filename', 'json-filesize', updG);
function updG() {
  const a = document.getElementById('xlsx-input').files.length;
  const b = document.getElementById('json-input').files.length;
  document.getElementById('generate-btn').disabled = !(a && b);
  if (a || b) setWF('wf-generate', 1);
}

document.getElementById('generate-btn').addEventListener('click', async () => {
  const btn = document.getElementById('generate-btn');
  btn.disabled = true;
  showSt('generate-status', 'lo', '<span class="sp"></span>正在生成 JSON...<div class="pb"><div class="bar"></div></div>');
  const xf = document.getElementById('xlsx-input').files[0];
  const jf = document.getElementById('json-input').files[0];
  const fd = new FormData();
  fd.append('xlsx', xf);
  fd.append('json', jf);
  fd.append('dirPattern', document.getElementById('dir-pattern-input').value.trim());
  try {
    const r = await fetch('/api/generate', { method: 'POST', body: fd });
    if (!r.ok) throw new Error(await r.text());
    const ct = r.headers.get('X-I18n-Count') || '-';
    const lg = r.headers.get('X-I18n-Langs') || '';
    const comp = r.headers.get('X-I18n-Completion') || '';
    const phwarn = r.headers.get('X-I18n-PH-Warn') || '';
    let compHtml = '';
    if (comp) {
      compHtml = '<div style="font-size:12px;margin-top:4px">' + comp.split(',').map(c => {
        const [lang, pct] = c.split(':');
        const num = parseFloat(pct);
        const icon = num >= 100 ? '&#10003;' : (num > 0 ? '&#9888;' : '&#10007;');
        const color = num >= 100 ? '#059669' : (num > 0 ? '#d97706' : '#dc2626');
        return '<span style="color:' + color + ';margin-right:10px">' + icon + ' ' + lang + ': ' + pct + '%</span>';
      }).join('') + '</div>';
    }
    if (phwarn) {
      compHtml += '<div style="font-size:12px;margin-top:4px;color:#dc2626">&#9888; 占位符不匹配: ' + phwarn.split(',').map(c => {
        const [lang, n] = c.split(':');
        return lang + '(' + n + '条)';
      }).join(', ') + '</div>';
    }
    const blob = await r.blob();
    const url = URL.createObjectURL(blob);
    const nm = jf.name.replace(/\.json$/i, '_translations.zip');
    addH({ type: 'generate', filename: jf.name + ' + ' + xf.name, count: ct, langs: lg, filesize: jf.size + xf.size, status: 'done' });
    showSt('generate-status', 'ok', '&#10003; 生成成功' + compHtml + '<br><a href="' + url + '" download="' + nm + '" class="btn btn-s">&#8595; 下载 JSON（ZIP）</a>');
    document.querySelectorAll('#wf-generate .step').forEach(s => s.classList.add('done'));
  } catch (e) {
    addH({ type: 'generate', filename: jf.name, status: 'error', error: e.message });
    showSt('generate-status', 'er', '&#10007; ' + (e.message || '处理失败'));
  } finally { btn.disabled = false; }
});

// Dir pattern buttons - insert at cursor
document.querySelectorAll('.dp-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById('dir-pattern-input');
    const val = btn.dataset.var;
    const start = inp.selectionStart;
    const end = inp.selectionEnd;
    const before = inp.value.substring(0, start);
    const after = inp.value.substring(end);
    inp.value = before + val + after;
    const pos = start + val.length;
    inp.setSelectionRange(pos, pos);
    inp.focus();
    saveSettingsPatch({ dirPattern: inp.value });
  });
});

// Dir pattern preset — replace whole input value
document.querySelectorAll('.dp-preset').forEach(btn => {
  btn.addEventListener('click', () => {
    document.getElementById('dir-pattern-input').value = btn.dataset.pattern;
    saveSettingsPatch({ dirPattern: btn.dataset.pattern });
    document.getElementById('dir-pattern-input').focus();
  });
});

// Dir pattern input memory
document.getElementById('dir-pattern-input').addEventListener('input', () => {
  saveSettingsPatch({ dirPattern: document.getElementById('dir-pattern-input').value });
});

// Dialog
let dialogCallback = null;

function showDialog(title, msg, cb) {
  document.getElementById('dialog-title').textContent = title;
  document.getElementById('dialog-msg').textContent = msg;
  dialogCallback = cb;
  document.getElementById('dialog-overlay').classList.add('sh');
}

function closeDialog() {
  document.getElementById('dialog-overlay').classList.remove('sh');
  dialogCallback = null;
}

document.getElementById('dialog-cancel').addEventListener('click', closeDialog);
document.getElementById('dialog-overlay').addEventListener('click', function(e) {
  if (e.target === this) closeDialog();
});
document.getElementById('dialog-confirm').addEventListener('click', function() {
  if (dialogCallback) dialogCallback();
  closeDialog();
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') closeDialog();
});

// Clear
document.getElementById('clear-btn').addEventListener('click', () => {
  showDialog('清空所有记录', '确定要清空所有操作历史记录吗？此操作不可恢复。', function() {
    saveH([]);
  });
});

function toggleHD(id) {
  document.getElementById('hd-' + id).classList.toggle('sh');
}

function showDelDialog(id) {
  showDialog('删除记录', '确定要删除该条操作记录吗？', function() {
    delH(id);
  });
}

function delH(id) {
  const h = loadH();
  saveH(h.filter(item => item.id !== id));
}

// Centralized settings restore — runs once at page load
function restoreSettings() {
  const s = loadSettings();
  if (s.extractLangs !== undefined) document.getElementById('extract-langs').value = s.extractLangs;
  if (s.dirPattern !== undefined) document.getElementById('dir-pattern-input').value = s.dirPattern;
  if (s.splitTags !== undefined) document.getElementById('split-tags-check').checked = s.splitTags;
  if (s.stripTags !== undefined && !s.splitTags) document.getElementById('strip-tags-check').checked = s.stripTags;
  toggleStripTagsVisibility();
}

updateBadge();
renderH();
loadLangs();
restoreSettings();
</script>
</body>
</html>
